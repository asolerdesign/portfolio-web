<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Alberto Soler — Graphic Design &amp; Visual Communication</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* Let the wallpaper show through */
    html { background: #f4f4f4; }
    body { background: transparent; }
    /* Sticky nav keeps a soft frosted look so wordmark stays legible */
    .nav { background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

    /* Hide the liquid wallpaper at tablet width and below — show flat bg */
    @media (max-width: 1024px) {
      #bg-gl { display: none !important; }
      html, body { background: #f4f4f4; }
    }
  </style>
</head>
<body data-screen-label="Alberto Soler Portfolio">
  <div id="root"></div>

  <script src="wallpaper-bg.js"></script>
  <script src="image-slot.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>

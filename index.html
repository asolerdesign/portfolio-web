<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Alberto Soler — Graphic Design &amp; Visual Communication</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Alberto Soler — graphic design &amp; visual communication. Brand strategy, visual identity and art direction, based in Barcelona."/>
  <style>
    /* Let the wallpaper show through */
    html { background: #f4f4f4; }
    body { background: transparent; }
    /* Sticky nav keeps a soft frosted look so wordmark stays legible */
    .nav { background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

    /* Hide the liquid wallpaper at tablet width and below — show flat bg */
    @media (max-width: 1024px) {
      #bg-gl { display: none !important; }
      html, body { background: #f4f4f4; }
      /* No wallpaper to frost over here — drop the blur so it doesn't trap
         the fixed mobile-menu overlay as its containing block. */
      .nav {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
    }
  </style>
</head>
<body data-screen-label="Alberto Soler Portfolio">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
